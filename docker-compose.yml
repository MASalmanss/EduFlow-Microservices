services:
  mongodb:
    image: mongo:7.0
    container_name: eduflow-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root123
      MONGO_INITDB_DATABASE: CatalogDb
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7.2
    container_name: eduflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
