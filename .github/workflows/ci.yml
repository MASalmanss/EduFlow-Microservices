name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Restore
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore EduFlow.sln

      - name: Build solution
        run: dotnet build EduFlow.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test EduFlow.sln --no-build --configuration Release
